<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whale Portfolio Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 2px solid #000; color: #000; font-weight: 600; }
        .tab-inactive { color: #6b7280; font-weight: 400; }
        .tab-inactive:hover { color: #374151; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

<div class="max-w-6xl mx-auto px-4 py-8">
    <header class="mb-8">
        <h1 class="text-3xl font-bold tracking-tight">Alpha Whale Portfolio</h1>
        <p id="update-date" class="text-sm text-gray-500 mt-2">数据加载中...</p>
    </header>

    <div class="border-b border-gray-200 mb-6">
        <nav id="tabs-nav" class="-mb-px flex space-x-8" aria-label="Tabs"></nav>
    </div>

    <div class="flex space-x-4 mb-4 text-sm">
        <button class="bg-gray-200 px-3 py-1 rounded font-medium">Portfolio (当前持仓)</button>
        <button class="text-gray-500 px-3 py-1 hover:bg-gray-100 rounded cursor-not-allowed" title="需重构爬虫数据支持">Activity (历史操作 🔒)</button>
    </div>

    <div class="bg-white shadow-sm ring-1 ring-gray-900/5 sm:rounded-xl overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th scope="col" class="py-3.5 pl-4 pr-3 text-left text-sm font-semibold text-gray-900">Stock / Ticker</th>
                    <th scope="col" class="px-3 py-3.5 text-right text-sm font-semibold text-gray-900">Shares</th>
                    <th scope="col" class="px-3 py-3.5 text-right text-sm font-semibold text-gray-900">Value (USD)</th>
                    <th scope="col" class="px-3 py-3.5 text-right text-sm font-semibold text-gray-900">% of Portfolio</th>
                </tr>
            </thead>
            <tbody id="table-body" class="divide-y divide-gray-200">
                </tbody>
        </table>
    </div>
</div>

<script>
    let globalData = null;

    // 格式化数字：加上千分位和货币符号
    const formatNumber = (num) => new Intl.NumberFormat('en-US').format(num);
    const formatCurrency = (num) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(num);

    // 加载 JSON 数据
    async function loadData() {
        try {
            const response = await fetch('whale_holdings.json');
            globalData = await response.json();
            document.getElementById('update-date').innerText = `最新披露快照：${globalData.last_updated} (数据源: SEC 13F)`;
            
            initTabs();
        } catch (error) {
            document.getElementById('update-date').innerText = "⚠️ 无法加载数据，请确保 whale_holdings.json 存在。";
        }
    }

    // 初始化选项卡
    function initTabs() {
        const tabsNav = document.getElementById('tabs-nav');
        const holders = Object.keys(globalData.holders);
        
        holders.forEach((holder, index) => {
            const btn = document.createElement('button');
            btn.innerText = holder;
            // 默认选中第一个
            btn.className = `whitespace-nowrap py-4 px-1 text-sm ${index === 0 ? 'tab-active' : 'tab-inactive'}`;
            btn.onclick = (e) => {
                // 切换样式
                Array.from(tabsNav.children).forEach(child => {
                    child.className = `whitespace-nowrap py-4 px-1 text-sm tab-inactive`;
                });
                e.target.className = `whitespace-nowrap py-4 px-1 text-sm tab-active`;
                // 渲染对应数据
                renderTable(holder);
            };
            tabsNav.appendChild(btn);
        });

        // 初次渲染第一个大佬的数据
        if (holders.length > 0) renderTable(holders[0]);
    }

    // 渲染表格数据
    function renderTable(holderName) {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = ''; // 清空旧数据
        const holdings = globalData.holders[holderName];

        holdings.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="whitespace-nowrap py-4 pl-4 pr-3 text-sm font-medium text-gray-900 flex items-center">
                    <img src="https://logo.clearbit.com/${item.domain}" onerror="this.src='https://www.google.com/s2/favicons?domain=${item.domain}'" class="w-6 h-6 rounded mr-3">
                    ${item.company}
                </td>
                <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500 text-right">${item.shares ? formatNumber(item.shares.replace(/,/g, '')) : 'N/A'}</td>
                <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500 text-right">${formatCurrency(item.value_usd)}</td>
                <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-900 font-semibold text-right">${item.percent}%</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 启动执行
    loadData();
</script>

</body>
</html>
